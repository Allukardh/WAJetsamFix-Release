name: Verify WAJetsamFix public history

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-public-history.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Releases and presentation
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          REPO="$GITHUB_REPOSITORY"
          PACKAGE="com.allukardh.wajetsamfix_0.7.1_iphoneos-arm64.deb"
          EXPECTED_SHA256="17670a96b751ef7f94979e399774931b53511b53c4687b1a5d6d48ab7d7ac115"

          expected_tags=(
            v0.7.1
            v0.7.1-rc1
            v0.7.0
            v0.7.0-rc1
            v0.7.0-alpha2
            v0.7.0-alpha1
            v0.6.2
            v0.6.1
            v0.6.0
            v0.5.1
            v0.5.0
            v0.4.1
            v0.4.0
            v0.3.0
            v0.2.0
            v0.1.0
          )

          mapfile -t actual_tags < <(gh api "repos/$REPO/releases?per_page=100" --jq '.[].tag_name')
          test "${#actual_tags[@]}" -eq "${#expected_tags[@]}"

          for i in "${!expected_tags[@]}"; do
            test "${actual_tags[$i]}" = "${expected_tags[$i]}"
          done

          test "$(gh api "repos/$REPO/releases/latest" --jq .tag_name)" = "v0.7.1"
          test "$(gh release view v0.7.1 --repo "$REPO" --json assets --jq '.assets | length')" = "1"
          test "$(gh release view v0.7.1 --repo "$REPO" --json assets --jq '.assets[0].name')" = "$PACKAGE"
          test "$(gh release view v0.7.1 --repo "$REPO" --json body --jq '.body | contains("Support WAJetsamFix")')" = "true"

          for tag in "${expected_tags[@]:1}"; do
            test "$(gh release view "$tag" --repo "$REPO" --json assets --jq '.assets | length')" = "0"
          done

          test "$(gh release view v0.7.0-alpha1 --repo "$REPO" --json isPrerelease --jq .isPrerelease)" = "true"
          test "$(gh release view v0.7.0-alpha2 --repo "$REPO" --json isPrerelease --jq .isPrerelease)" = "true"
          test "$(gh release view v0.7.0-rc1 --repo "$REPO" --json isPrerelease --jq .isPrerelease)" = "true"
          test "$(gh release view v0.7.1-rc1 --repo "$REPO" --json isPrerelease --jq .isPrerelease)" = "true"

          mkdir -p /tmp/package
          gh release download v0.7.1 --repo "$REPO" --pattern "$PACKAGE" --dir /tmp/package
          test "$(sha256sum "/tmp/package/$PACKAGE" | awk '{print $1}')" = "$EXPECTED_SHA256"
          test "$(dpkg-deb -f "/tmp/package/$PACKAGE" Package)" = "com.allukardh.wajetsamfix"
          test "$(dpkg-deb -f "/tmp/package/$PACKAGE" Version)" = "0.7.1"
          test "$(dpkg-deb -f "/tmp/package/$PACKAGE" Architecture)" = "iphoneos-arm64"

          grep -Fq 'complete version history' README.md
          grep -Fq '## 💙 Support the project' README.md
          grep -Fq '## Future updates' SUPPORT.md
          grep -Fq '## [0.1.0]' CHANGELOG.md
          grep -Fq '## [0.7.1-rc1]' CHANGELOG.md

          cat > RELEASE_VERIFICATION.md <<'EOF'
          # Release verification

          The public WAJetsamFix presentation and Release history were independently verified after publication.

          - **Latest Release:** `v0.7.1`
          - **Total Release entries:** 16
          - **Historical entries:** 15
          - **Historical downloadable packages:** 0
          - **Historical pre-releases:** 4
          - **Current asset:** `com.allukardh.wajetsamfix_0.7.1_iphoneos-arm64.deb`
          - **Current asset count:** 1
          - **SHA-256:** `17670a96b751ef7f94979e399774931b53511b53c4687b1a5d6d48ab7d7ac115`
          - **Package:** `com.allukardh.wajetsamfix`
          - **Version:** `0.7.1`
          - **Architecture:** `iphoneos-arm64`
          - **Release order:** verified from newest to oldest
          - **Current sponsorship note:** present above the downloadable asset
          - **README sponsorship section:** present only at the end of the README
          - **Public version history:** complete and linked from the README
          - **Future-update policy:** documented in `SUPPORT.md`
          - **Result:** passed
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RELEASE_VERIFICATION.md
          git commit -m "Record public history verification"
          git push origin main
